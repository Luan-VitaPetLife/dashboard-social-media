<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar · Redes Sociais · Coco and Luna</title>
<link rel="icon" href="favicon.png" type="image/png">
<style>
  :root{
    --text:#1c2b39; --sub:#55636f; --muted:#96a3ad;
    --border:rgba(28,43,57,.12); --radius:12px; --accent:#dd2a7b;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(160deg,#fbe3e0 0%,#f6e9ec 45%,#eef1fb 100%);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; color:var(--text);
    padding:20px;
  }
  .card{
    width:100%; max-width:340px; background:#fff; border:1px solid var(--border); border-radius:var(--radius);
    padding:32px 28px; box-shadow:0 12px 32px rgba(28,43,57,.10);
  }
  .brand{display:flex; align-items:center; gap:11px; margin-bottom:26px}
  .brand img{width:36px; height:36px; border-radius:10px; object-fit:cover}
  .brand .name{font-size:13.5px; font-weight:700}
  .brand .sub{font-size:11px; color:var(--muted)}
  h1{font-size:15px; font-weight:700; margin:0 0 18px}
  label{display:block; font-size:11.5px; font-weight:600; color:var(--sub); margin-bottom:6px}
  input[type="password"]{
    width:100%; padding:11px 13px; border:1px solid var(--border); border-radius:9px;
    font-size:13.5px; color:var(--text); margin-bottom:16px; font-family:inherit;
  }
  input[type="password"]:focus{outline:2px solid var(--accent); outline-offset:1px; border-color:var(--accent)}
  button{
    width:100%; padding:11px; border:none; border-radius:9px; background:var(--text); color:#fff;
    font-size:13.5px; font-weight:600; cursor:pointer; font-family:inherit;
  }
  button:disabled{opacity:.6; cursor:default}
  button:hover:not(:disabled){background:#0f1922}
  .error{
    display:none; font-size:12px; color:#c0392b; background:rgba(192,57,43,.08); border-radius:8px;
    padding:9px 11px; margin-bottom:14px;
  }
  .error.show{display:block}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="Logo2.png" alt="Vita Pet Life">
      <div>
        <div class="name">Vita Pet Life</div>
        <div class="sub">Coco and Luna · Redes Sociais</div>
      </div>
    </div>
    <h1>Entrar</h1>
    <div class="error" id="err"></div>
    <form id="loginForm">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" autocomplete="current-password" autofocus required>
      <button type="submit" id="submitBtn">Entrar</button>
    </form>
  </div>

<script>
  const form = document.getElementById('loginForm');
  const errBox = document.getElementById('err');
  const btn = document.getElementById('submitBtn');

  function showError(msg) {
    errBox.textContent = msg;
    errBox.classList.add('show');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errBox.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Entrando…';
    try {
      const password = document.getElementById('password').value;
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Não foi possível entrar.'); return; }
      const params = new URLSearchParams(location.search);
      location.href = params.get('next') || '/index.html';
    } catch {
      showError('Erro de conexão. Tente de novo.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  });
</script>
</body>
</html>
