<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redes Sociais · Coco and Luna</title>
<style>
  :root{
    --bg:#f7f5f1; --surface:#fff; --border:#e6e1d8; --text:#2c2a26; --muted:#8a8478;
    --sage:#6a8c6e; --accent:#c97b4a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  header{padding:24px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  h1{font-size:19px;font-weight:600;margin:0}
  .sub{color:var(--muted);font-size:13px;margin-top:2px}
  button{background:var(--sage);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer}
  button:hover{opacity:.9}
  main{padding:24px 28px;max-width:1100px;margin:0 auto}
  h3.section{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:28px 0 12px}
  h3.section:first-child{margin-top:0}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:8px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
  .card h2{font-size:13px;font-weight:700;margin:0 0 14px;display:flex;align-items:center;gap:8px}
  .flag{font-size:15px}
  .kpi-row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0}
  .kpi-lbl{font-size:13px;color:var(--muted)}
  .kpi-val{font-size:22px;font-weight:300}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase}
  .empty{color:var(--muted);font-size:13px;padding:20px 0;text-align:center}
  .hist-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:16px}
  .hist-card h2{font-size:13px;font-weight:700;margin:0 0 14px}
  footer{padding:20px 28px;color:var(--muted);font-size:12px;text-align:center}
</style>
</head>
<body>

<header>
  <div>
    <h1>Redes Sociais · Coco and Luna</h1>
    <div class="sub" id="lastSync">carregando…</div>
  </div>
  <button id="syncBtn">Sincronizar agora</button>
</header>

<main>
  <h3 class="section">Agora</h3>
  <div class="grid">
    <div class="card"><h2><span class="flag">🇧🇷</span> Instagram Brasil</h2><div id="igBrKpis"><div class="empty">sem dado ainda</div></div></div>
    <div class="card"><h2><span class="flag">🇺🇸</span> Instagram EUA</h2><div id="igUsKpis"><div class="empty">sem dado ainda</div></div></div>
    <div class="card"><h2><span class="flag">🇧🇷</span> Facebook Brasil</h2><div id="fbBrKpis"><div class="empty">sem dado ainda</div></div></div>
    <div class="card"><h2><span class="flag">🇺🇸</span> Facebook EUA</h2><div id="fbUsKpis"><div class="empty">sem dado ainda</div></div></div>
  </div>

  <h3 class="section">Histórico (últimos snapshots)</h3>
  <div class="hist-card"><h2>🇧🇷 Brasil</h2><div id="histBr"><div class="empty">sem dado ainda</div></div></div>
  <div class="hist-card"><h2>🇺🇸 Estados Unidos</h2><div id="histUs"><div class="empty">sem dado ainda</div></div></div>
</main>

<footer id="footer">Coco and Luna</footer>

<script>
function fmt(n) { return n == null ? '—' : n.toLocaleString('pt-BR'); }
function fmtDate(iso) { return iso ? new Date(iso).toLocaleString('pt-BR') : '—'; }

function latestEntry(snapshots) {
  const dates = Object.keys(snapshots || {}).sort();
  if (!dates.length) return null;
  return { date: dates[dates.length - 1], ...snapshots[dates[dates.length - 1]] };
}

function renderKpis(el, latest, rows) {
  if (!latest) { el.innerHTML = '<div class="empty">sem dado ainda</div>'; return; }
  el.innerHTML = rows.map(([label, val]) =>
    `<div class="kpi-row"><span class="kpi-lbl">${label}</span><span class="kpi-val">${fmt(val)}</span></div>`
  ).join('');
}

function renderHistory(el, ig, fb) {
  const dates = Array.from(new Set([...Object.keys(ig || {}), ...Object.keys(fb || {})])).sort().reverse().slice(0, 30);
  if (!dates.length) { el.innerHTML = '<div class="empty">sem dado ainda</div>'; return; }
  el.innerHTML = `<table>
    <thead><tr><th>Data</th><th>IG Seguidores</th><th>IG Curtidas (amostra)</th><th>FB Curtidas</th><th>FB Seguidores</th></tr></thead>
    <tbody>${dates.map(d => `<tr>
      <td>${d}</td>
      <td>${fmt(ig?.[d]?.followers)}</td>
      <td>${fmt(ig?.[d]?.recentLikes)}</td>
      <td>${fmt(fb?.[d]?.likes)}</td>
      <td>${fmt(fb?.[d]?.followers)}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

async function load() {
  const res = await fetch('/api/dashboard');
  const data = await res.json();

  const igBr = latestEntry(data.instagram.br), igUs = latestEntry(data.instagram.us);
  const fbBr = latestEntry(data.facebook.br),  fbUs = latestEntry(data.facebook.us);

  renderKpis(document.getElementById('igBrKpis'), igBr, [
    ['Seguidores', igBr?.followers], ['Seguindo', igBr?.following],
    ['Posts', igBr?.posts], ['Curtidas (últimos posts)', igBr?.recentLikes],
  ]);
  renderKpis(document.getElementById('igUsKpis'), igUs, [
    ['Seguidores', igUs?.followers], ['Seguindo', igUs?.following],
    ['Posts', igUs?.posts], ['Curtidas (últimos posts)', igUs?.recentLikes],
  ]);
  renderKpis(document.getElementById('fbBrKpis'), fbBr, [
    ['Curtidas da página', fbBr?.likes], ['Seguidores', fbBr?.followers],
  ]);
  renderKpis(document.getElementById('fbUsKpis'), fbUs, [
    ['Curtidas da página', fbUs?.likes], ['Seguidores', fbUs?.followers],
  ]);

  renderHistory(document.getElementById('histBr'), data.instagram.br, data.facebook.br);
  renderHistory(document.getElementById('histUs'), data.instagram.us, data.facebook.us);

  document.getElementById('lastSync').textContent = 'última sincronização: ' + fmtDate(data.lastSync);
}

document.getElementById('syncBtn').addEventListener('click', async (e) => {
  e.target.disabled = true;
  e.target.textContent = 'Sincronizando…';
  try { await fetch('/api/sync', { method: 'POST' }); await load(); }
  finally { e.target.disabled = false; e.target.textContent = 'Sincronizar agora'; }
});

load();
</script>
</body>
</html>
