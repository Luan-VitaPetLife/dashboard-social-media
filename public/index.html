<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redes Sociais · Coco and Luna</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<style>
  :root{
    --bg:#ffffff; --surface:#ffffff; --surface2:#f6f7f9;
    --border:rgba(28,43,57,.10); --border2:rgba(28,43,57,.18);
    --text:#1c2b39; --sub:#55636f; --muted:#96a3ad;
    --radius:12px; --radius-sm:8px;
    --ig-1:#f58529; --ig-2:#dd2a7b; --ig-3:#8134af; --ig-4:#515bd4;
    --fb:#1877f2;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px;line-height:1.5}

  .main{margin-left:224px;min-height:100vh;display:flex;flex-direction:column}
  @media(max-width:768px){.main{margin-left:0}}

  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:60px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:100}
  .topbar h1{font-size:16px;font-weight:700;margin:0}
  .topbar .sub{color:var(--muted);font-size:11.5px;margin-top:1px}

  .sync-btn{height:34px;padding:0 16px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);
    font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px}
  .sync-btn:hover{border-color:var(--text);color:var(--text)}
  .sync-btn:disabled{opacity:.6;cursor:default}

  .content{padding:28px 32px;max-width:1100px;width:100%;margin:0 auto}
  h3.section{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:32px 0 14px}
  h3.section:first-child{margin-top:0}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:18px 20px;box-shadow:0 1px 2px rgba(28,43,57,.04)}
  .card-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .badge{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:15px;flex-shrink:0}
  .badge.ig{background:linear-gradient(135deg,var(--ig-1),var(--ig-2) 45%,var(--ig-3) 70%,var(--ig-4))}
  .badge.fb{background:var(--fb)}
  .card-title{display:flex;flex-direction:column;line-height:1.3}
  .card-title .name{font-size:12.5px;font-weight:700}
  .card-title .mkt{font-size:10.5px;color:var(--muted);display:flex;align-items:center;gap:4px}
  .card-title .mkt img{width:13px;height:9px;object-fit:cover;border-radius:2px}

  .kpi-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--border)}
  .kpi-row:last-child{border-bottom:none;padding-bottom:0}
  .kpi-lbl{font-size:12px;color:var(--sub)}
  .kpi-val{font-size:20px;font-weight:300;letter-spacing:-.3px}

  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:700;font-size:10px;letter-spacing:.4px;text-transform:uppercase}
  tbody tr:hover{background:var(--surface2)}

  .empty{color:var(--muted);font-size:12.5px;padding:22px 0;text-align:center}

  .hist-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:18px 20px;margin-bottom:16px;box-shadow:0 1px 2px rgba(28,43,57,.04)}
  .hist-card h2{font-size:12.5px;font-weight:700;margin:0 0 14px;display:flex;align-items:center;gap:7px}
  .hist-card h2 img{width:15px;height:11px;object-fit:cover;border-radius:2px}

  footer{padding:22px 32px;color:var(--muted);font-size:11.5px;text-align:center}
</style>
</head>
<body>

<div class="main">
  <header class="topbar">
    <div>
      <h1>Redes Sociais</h1>
      <div class="sub" id="lastSync">carregando…</div>
    </div>
    <button class="sync-btn" id="syncBtn"><i class="bi bi-arrow-repeat"></i> Sincronizar agora</button>
  </header>

  <main class="content">
    <h3 class="section">Agora</h3>
    <div class="grid">
      <div class="card">
        <div class="card-head">
          <div class="badge ig"><i class="bi bi-instagram"></i></div>
          <div class="card-title"><span class="name">Instagram</span><span class="mkt"><img src="https://flagcdn.com/w40/br.png" alt="BR"> Brasil</span></div>
        </div>
        <div id="igBrKpis"><div class="empty">sem dado ainda</div></div>
      </div>
      <div class="card">
        <div class="card-head">
          <div class="badge ig"><i class="bi bi-instagram"></i></div>
          <div class="card-title"><span class="name">Instagram</span><span class="mkt"><img src="https://flagcdn.com/w40/us.png" alt="EUA"> Estados Unidos</span></div>
        </div>
        <div id="igUsKpis"><div class="empty">sem dado ainda</div></div>
      </div>
      <div class="card">
        <div class="card-head">
          <div class="badge fb"><i class="bi bi-facebook"></i></div>
          <div class="card-title"><span class="name">Facebook</span><span class="mkt"><img src="https://flagcdn.com/w40/br.png" alt="BR"> Brasil</span></div>
        </div>
        <div id="fbBrKpis"><div class="empty">sem dado ainda</div></div>
      </div>
      <div class="card">
        <div class="card-head">
          <div class="badge fb"><i class="bi bi-facebook"></i></div>
          <div class="card-title"><span class="name">Facebook</span><span class="mkt"><img src="https://flagcdn.com/w40/us.png" alt="EUA"> Estados Unidos</span></div>
        </div>
        <div id="fbUsKpis"><div class="empty">sem dado ainda</div></div>
      </div>
    </div>

    <h3 class="section">Histórico (últimos snapshots)</h3>
    <div class="hist-card"><h2><img src="https://flagcdn.com/w40/br.png" alt="BR"> Brasil</h2><div id="histBr"><div class="empty">sem dado ainda</div></div></div>
    <div class="hist-card"><h2><img src="https://flagcdn.com/w40/us.png" alt="EUA"> Estados Unidos</h2><div id="histUs"><div class="empty">sem dado ainda</div></div></div>
  </main>

  <footer id="footer">Coco and Luna · Redes Sociais</footer>
</div>

<script src="sidebar.js"></script>
<script>
function fmt(n) { return n == null ? '—' : n.toLocaleString('pt-BR'); }
function fmtDate(iso) { return iso ? new Date(iso).toLocaleString('pt-BR') : '—'; }

function latestEntry(snapshots) {
  const dates = Object.keys(snapshots || {}).sort();
  if (!dates.length) return null;
  return { date: dates[dates.length - 1], ...snapshots[dates[dates.length - 1]] };
}

function renderKpis(el, latest, rows) {
  if (!latest) { el.innerHTML = '<div class="empty">sem dado ainda</div>'; return; }
  el.innerHTML = rows.map(([label, val]) =>
    `<div class="kpi-row"><span class="kpi-lbl">${label}</span><span class="kpi-val">${fmt(val)}</span></div>`
  ).join('');
}

function renderHistory(el, ig, fb) {
  const dates = Array.from(new Set([...Object.keys(ig || {}), ...Object.keys(fb || {})])).sort().reverse().slice(0, 30);
  if (!dates.length) { el.innerHTML = '<div class="empty">sem dado ainda</div>'; return; }
  el.innerHTML = `<table>
    <thead><tr><th>Data</th><th>IG Seguidores</th><th>IG Curtidas (amostra)</th><th>FB Curtidas</th><th>FB Seguidores</th></tr></thead>
    <tbody>${dates.map(d => `<tr>
      <td>${d}</td>
      <td>${fmt(ig?.[d]?.followers)}</td>
      <td>${fmt(ig?.[d]?.recentLikes)}</td>
      <td>${fmt(fb?.[d]?.likes)}</td>
      <td>${fmt(fb?.[d]?.followers)}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

async function load() {
  const res = await fetch('/api/dashboard');
  const data = await res.json();

  const igBr = latestEntry(data.instagram.br), igUs = latestEntry(data.instagram.us);
  const fbBr = latestEntry(data.facebook.br),  fbUs = latestEntry(data.facebook.us);

  renderKpis(document.getElementById('igBrKpis'), igBr, [
    ['Seguidores', igBr?.followers], ['Seguindo', igBr?.following],
    ['Posts', igBr?.posts], ['Curtidas (últimos posts)', igBr?.recentLikes],
  ]);
  renderKpis(document.getElementById('igUsKpis'), igUs, [
    ['Seguidores', igUs?.followers], ['Seguindo', igUs?.following],
    ['Posts', igUs?.posts], ['Curtidas (últimos posts)', igUs?.recentLikes],
  ]);
  renderKpis(document.getElementById('fbBrKpis'), fbBr, [
    ['Curtidas da página', fbBr?.likes], ['Seguidores', fbBr?.followers],
  ]);
  renderKpis(document.getElementById('fbUsKpis'), fbUs, [
    ['Curtidas da página', fbUs?.likes], ['Seguidores', fbUs?.followers],
  ]);

  renderHistory(document.getElementById('histBr'), data.instagram.br, data.facebook.br);
  renderHistory(document.getElementById('histUs'), data.instagram.us, data.facebook.us);

  document.getElementById('lastSync').textContent = 'última sincronização: ' + fmtDate(data.lastSync);
}

document.getElementById('syncBtn').addEventListener('click', async (e) => {
  e.target.disabled = true;
  e.target.innerHTML = '<i class="bi bi-arrow-repeat"></i> Sincronizando…';
  try { await fetch('/api/sync', { method: 'POST' }); await load(); }
  finally { e.target.disabled = false; e.target.innerHTML = '<i class="bi bi-arrow-repeat"></i> Sincronizar agora'; }
});

load();
</script>
</body>
</html>
